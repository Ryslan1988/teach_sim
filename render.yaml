services:
  - type: web
    name: teach-sim
    runtime: static
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_MULTIPLAYER_URL
        value: wss://teach-sim-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
