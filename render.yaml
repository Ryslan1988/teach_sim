services:
  - type: web
    name: teach-sim
    runtime: static
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_MULTIPLAYER_URL
        value: wss://teach-sim-server.onrender.com
      - key: VITE_AI_API_BASE_URL
        value: https://teach-sim-ai.onrender.com/api
      - key: VITE_AI_TIMEOUT_MS
        value: 45000
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
